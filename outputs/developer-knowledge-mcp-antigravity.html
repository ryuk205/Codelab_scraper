                    <span class="step-duration"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> 2 mins</span>

                <div class="step-content">
                    <h2 class="step-title" data-text="Introduction" id="0" tabindex="-1">
              1. Introduction
          </h2>
<div class="callout callout-note" style="background-color: #e8f0fe; border-left: 4px solid #1a73e8; padding: 1rem; border-radius: 0 4px 4px 0; margin: 1.5rem 0; color: #185abc;"><p><strong>Note:</strong> Are you still using the Gemini CLI? This guide covers the Antigravity CLI. More information on how to transition can be found in <a href="https://developers.googleblog.com/an-important-update-transitioning-gemini-cli-to-antigravity-cli/" target="_blank">this official blog post</a>.</p>
</div>
<p><a href="https://developers.google.com/knowledge" target="_blank"><strong>Google Developer Knowledge</strong></a> is the canonical, machine-readable source of Google's public developer documentation. It's programmatically accessible via Application Programming Interface (API) and Model Context Protocol (MCP) so that developers can integrate it into applications and workflows.</p>
<p>Instead of relying on outdated LLM training data or manual web scraping, AI agent developers should use it for real-time access to the most accurate documentation and reduce risk of hallucinations.</p>
<p>In this codelab, you will learn how to install and use the <strong>Developer Knowledge MCP</strong> from <strong>Antigravity 2.0, IDE, and/or CLI</strong>. MCP is an open standard that enables AI models to securely use tools provided by remote servers. You will set up <strong>Antigravity</strong> to interact with the knowledge base without writing any code!</p>
<p class="image-container"><img alt="dk_mcp_antigravity.png" sizes="(max-width: 840px) 100vw, 856px" src="https://codelabs.developers.google.com/static/developer-knowledge-mcp-antigravity/img/dk_mcp_antigravity.png" style="max-width: 100%; height: auto; display: block; margin: 1.5rem auto; border-radius: 8px;"/></p>
<h2 data-text="What you'll do" id="what-youll-do" is-upgraded="" tabindex="-1">What you'll do</h2>
<ul>
<li>Enable the <strong>Developer Knowledge API</strong> in your Google Cloud project.</li>
<li>Configure <strong>Antigravity</strong> to access the <strong>Developer Knowledge MCP</strong>.</li>
<li>Test the integration with a few <strong>prompts</strong>.</li>
</ul>
<h2 data-text="What you'll need" id="what-youll-need" is-upgraded="" tabindex="-1">What you'll need</h2>
<ul>
<li>A web browser such as <a href="https://www.google.com/chrome/" target="_blank">Chrome</a></li>
<li>A Google Cloud project (billing is <strong>not</strong> required).</li>
<li>Antigravity 2.0, IDE, and/or CLI installed on your local machine. You can find more detail and installation guidance from <a href="https://antigravity.google/docs/home" target="_blank">the official website</a>.</li>
</ul>
<h2 data-text="Explore more MCPs and tools" id="explore-more-mcps-and-tools" is-upgraded="" tabindex="-1">Explore more MCPs and tools</h2>
<p>In this codelab we only cover a few basic examples of what can be done using the Google Developer Knowledge MCP server. To see the full list of Google MCP servers and tools available, refer to the <a href="https://docs.cloud.google.com/mcp/supported-products" target="_blank">Supported Products</a>.</p>
<div class="callout callout-note" style="background-color: #e8f0fe; border-left: 4px solid #1a73e8; padding: 1rem; border-radius: 0 4px 4px 0; margin: 1.5rem 0; color: #185abc;"><p><strong>Note:</strong> To go further and learn how to connect AI agents to user data, you might want to check the codelab <a href="https://codelabs.developers.google.com/google-workspace-mcp-antigravity" target="_blank">Google Workspace MCP servers in Google Antigravity</a> that demonstrates how to set up the official Workspace MCP servers in Antigravity.</p>
</div>

                    <h2 class="step-title" data-text="Configure Cloud project" id="1" tabindex="-1">
              2. Configure Cloud project
          </h2>
<h2 data-text="Create or Select a Google Cloud project" id="create-or-select-a-google-cloud-project" is-upgraded="" tabindex="-1">Create or Select a Google Cloud project</h2>
<p>In the <a href="https://console.cloud.google.com" target="_blank">Google Cloud Console</a>, <a href="https://cloud.google.com/resource-manager/docs/creating-managing-projects" target="_blank"><strong>select or create a Google Cloud project</strong></a>.</p>
<h2 data-text="Enable the API" id="enable-the-api" is-upgraded="" tabindex="-1">Enable the API</h2>
<p>To use the Developer Knowledge MCP server, you must enable the standard Developer Knowledge API.</p>
<p><a href="https://console.cloud.google.com/flows/enableapi?apiid=developerknowledge.googleapis.com" target="_blank"><button class="button button-primary">Enable the Developer Knowledge API</button></a></p>
<h2 data-text="Create the API key" id="create-the-api-key" is-upgraded="" tabindex="-1">Create the API key</h2>
<p>To use the Developer Knowledge MCP server, you must use an API key. In the <a href="https://console.cloud.google.com" target="_blank">Google Cloud Console</a>, do the following:</p>
<ol type="1">
<li>Go to <strong>APIs &amp; Services</strong> &gt; <strong>Credentials</strong>.</li>
</ol>
<p><a href="https://console.cloud.google.com/apis/credentials" target="_blank"><button class="button button-primary">Go to Credentials</button></a></p>
<ol start="2" type="1">
<li>Click <strong>+ Create credentials</strong>, then select <strong>API key</strong> from the menu.</li>
<li>Set <strong>Name</strong> with an arbitrary name such as <code dir="ltr" translate="no">Antigravity</code>.</li>
<li>Click the <strong>Select API restrictions</strong> drop-down, type <code dir="ltr" translate="no">Developer Knowledge API</code>, check the result, then click <strong>OK</strong>.<div class="callout callout-note" style="background-color: #e8f0fe; border-left: 4px solid #1a73e8; padding: 1rem; border-radius: 0 4px 4px 0; margin: 1.5rem 0; color: #185abc;"><p><strong>Note:</strong> There is a short delay before <strong>Developer Knowledge API</strong> appears in the list after its enablement, wait a few minutes and try again if you cannot find it.</p>
</div>
</li>
</ol>
<p class="image-container"><img alt="create_api_key.png" sizes="(max-width: 840px) 100vw, 856px" src="https://codelabs.developers.google.com/static/developer-knowledge-mcp-antigravity/img/create_api_key.png" style="max-width: 100%; height: auto; display: block; margin: 1.5rem auto; border-radius: 8px;"/></p>
<ol start="5" type="1">
<li>Click <strong>Create</strong>.</li>
<li>Your API key is now displayed on the confirmation screen. Copy it to your clipboard, you'll need it to configure <strong>Antigravity</strong> in the next steps.<div class="callout callout-warning" style="background-color: #fce8e6; border-left: 4px solid #d93025; padding: 1rem; border-radius: 0 4px 4px 0; margin: 1.5rem 0; color: #a51d24;"><p><strong>Warning: </strong><strong>Important:</strong> Never share an API key publicly. The one you see in the following screenshot is fake, it was added for illustration purposes only.</p>
</div>
</li>
</ol>

                    <h2 class="step-title" data-text="Configure Antigravity" id="2" tabindex="-1">
              3. Configure Antigravity
          </h2>
<p>Now let's configure Antigravity to use the MCP endpoint. If you don't have Antigravity 2.0, IDE, and/or CLI installed, follow the instructions on the <a href="https://antigravity.google/docs/home" target="_blank">Antigravity website</a>.</p>
<h2 data-text="Add custom MCP servers" id="add-custom-mcp-servers" is-upgraded="" tabindex="-1">Add custom MCP servers</h2>
<p>Antigravity 2.0, IDE, and CLI share a central MCP configuration in the file <code dir="ltr" translate="no">~/.gemini/config/mcp_config.json</code>.</p>
<ol type="1">
<li>Open it in your preferred text editor.<div class="callout callout-note" style="background-color: #e8f0fe; border-left: 4px solid #1a73e8; padding: 1rem; border-radius: 0 4px 4px 0; margin: 1.5rem 0; color: #185abc;"><p><strong>Note:</strong> You can access the file directly from Antigravity IDE if you have it installed by following these steps:</p>
<ol type="1">
<li>Open <strong>MCP Servers</strong> via the <strong>...</strong> dropdown at the top of the editor's agent panel.</li>
<li>Click <strong>Manage MCP Servers</strong> then <strong>View raw config</strong>.</li>
</ol>
</div>
</li>
<li>Modify it with the following custom MCP server configuration. Before doing so, replace the <strong>&lt;YOUR_API_KEY&gt;</strong> placeholder with the API key you created in the previous steps:</li>
</ol>
<div></div><pre style="background-color: #f6f8fa; padding: 1rem; border-radius: 6px; overflow-x: auto; border: 1px solid #e1e4e8; margin: 1rem 0;"><code class="language-json">{
  "mcpServers": {
    "google-developer-knowledge": {
      "headers": {
        "X-Goog-Api-Key": "&lt;YOUR_API_KEY&gt;"
      },
      "serverUrl": "https://developerknowledge.googleapis.com/mcp"
    }
    ...
  }
  ...
}
</code></pre>
<ol start="3" type="1">
<li>Save it.<div class="callout callout-warning" style="background-color: #fce8e6; border-left: 4px solid #d93025; padding: 1rem; border-radius: 0 4px 4px 0; margin: 1.5rem 0; color: #a51d24;"><p><strong>Warning: </strong><strong>Important:</strong> Never share an API key publicly. The one you see in the following screenshot is fake, it was added for illustration purposes only.</p>
</div>
</li>
</ol>
<p class="image-container"><img alt="mcp_config.png" sizes="(max-width: 840px) 100vw, 856px" src="https://codelabs.developers.google.com/static/developer-knowledge-mcp-antigravity/img/mcp_config.png" style="max-width: 100%; height: auto; display: block; margin: 1.5rem auto; border-radius: 8px;"/></p>
<h2 data-text="Validate" id="validate" is-upgraded="" tabindex="-1">Validate</h2>
<p>You should see the MCP server that you configured as installed in Antigravity: <code dir="ltr" translate="no">google-developer-knowledge</code>.</p>
<h3 data-text="Antigravity 2.0" id="antigravity-2.0" is-upgraded="" tabindex="-1">Antigravity 2.0</h3>
<ol type="1">
<li>Click <strong>Settings</strong> at the bottom left.</li>
<li>Navigate to <strong>Customizations</strong>.</li>
<li>Under <strong>Installed MCP Servers</strong>, click <strong>Refresh</strong>.</li>
</ol>
<p class="image-container"><img alt="configured_mcp_server_20.png" sizes="(max-width: 840px) 100vw, 856px" src="https://codelabs.developers.google.com/static/developer-knowledge-mcp-antigravity/img/configured_mcp_server_20.png" style="max-width: 100%; height: auto; display: block; margin: 1.5rem auto; border-radius: 8px;"/></p>

    <script>
        function toggleTheme() {
            const body = document.body;
            const sunIcon = document.getElementById('sun-icon');
            const moonIcon = document.getElementById('moon-icon');
            
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
                localStorage.setItem('theme', 'dark');
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
                localStorage.setItem('theme', 'light');
            }
        }

        // Restore theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.remove('dark-mode');
            document.getElementById('sun-icon').style.display = 'block';
            document.getElementById('moon-icon').style.display = 'none';
        }

        // Sidebar active link highlighting on scroll
        const sections = document.querySelectorAll('.codelab-step');
        const navLinks = document.querySelectorAll('.sidebar-link');

        window.addEventListener('scroll', () => {
            let current = "";
            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - 120) {
                    current = section.getAttribute('id');
                }
            });

            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === `#` + current) {
                    link.classList.add('active');
                }
            });
        });
    </script>
